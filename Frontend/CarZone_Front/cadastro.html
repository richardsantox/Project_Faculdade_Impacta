<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarZone - Cadastro</title>

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/cadastro.css">
</head>
<body>
        <header>
        <div class="leftside">
            <a href="index.html"><img src="assets/images/carzoneLogo2.png" alt="CarZone" class="logo"></a>
        </div>
        <div class="middle">
            <ul>
                <li><a href="index.html">Catálogo</a></li>
                <li><a href="cadastro.html">Vender</a></li>
                <li><a href="">Sobre Nós</a></li>
            </ul>
        </div>
        <div class="rightside">
            <Ul>
                <li><a href="">Login</a></li>
                <li class="menu-icon">
                    <div></div>
                    <div></div>
                    <div></div>
                </li>
            </Ul>
        </div>
    </header>

    <main>
        <section class="registration-section">
            <div class="form-container">
                <h1>Cadastrar Veículo</h1>
                <p class="subtitle">Preencha os dados do seu veículo para colocá-lo à venda</p>

                <form class="car-registration-form" id="vehicleForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="marca">Marca</label>
                            <input type="text" id="marca" name="marca" placeholder="Ex: BMW, Mercedes, Tesla" required>
                        </div>
                        <div class="form-group">
                            <label for="modelo">Modelo</label>
                            <input type="text" id="modelo" name="modelo" placeholder="Ex: X5, C-Class, Model S" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="ano">Ano</label>
                            <input type="number" id="ano" name="ano" placeholder="Ex: 2023" required>
                        </div>
                        <div class="form-group">
                            <label for="valor">Valor (R$)</label>
                            <input type="number" id="valor" name="valor" placeholder="Ex: 250000" step="0.01" required>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="tipo">Tipo</label>
                        <input type="text" id="tipo" name="tipo" placeholder="Ex: Sedan, SUV, Hatchback, Conversível" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="imagem">Imagem do Veículo</label>
                        <input type="file" id="imagem" name="imagem" accept="image/*" required>
                    </div>

                    <button type="submit" class="btn-submit">Cadastrar Veículo</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
