<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarZone</title>

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    
    <header>
        <div class="leftside">
            <a href="index.html"><img src="assets/images/carzoneLogo2.png" alt="CarZone" class="logo"></a>
        </div>
        <div class="middle">
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">Catálogo</a></li>
                <li><a href="">Sobre Nós</a></li>
            </ul>
        </div>
        <div class="rightside">
            <Ul>
                <li><a href="">Login</a></li>
                <li class="menu-icon">
                    <div></div>
                    <div></div>
                    <div></div>
                </li>
            </Ul>
        </div>
    </header>

<!-------------------------------------------------------------------------->

    <main>
        <section class="top-section">
            <div class="info">
                <span>A MAIOR PLATAFORMA DE VEÍCULOS PREMIUM DO BRASIL</span>
                <h1>Encontre o Carro dos Seus Sonhos</h1>
                <p>Na CarZone você encontra os melhores modelos do mercado, com curadoria especializada, negociação segura e experiência 100% digital.</p>
                <button class="btn-cta">Explore os Modelos</button>
            </div>
            <div class="buttons-area">
                <button class="btn-ligth btn-carousel prev" onclick="prevSlide()">❮</button>
                <button class="btn-ligth btn-carousel next" onclick="nextSlide()">❯</button>
            </div>
        </section>

        <section class="filters-bar">
            <div class="buttons-area">
                <input class="buttons-area btn-dark" type="text" placeholder="Pesquisar Modelo">
                <div class="buttons-area">
                    <select class="btn-ligth"><option>Model</option></select>
                    <select class="btn-ligth"><option>Price</option></select>
                </div>
            </div></section>

        
        <section class="car-inventory">
            <div class="inventory-header">
                <h2>Nossa Frotra</h2>
                <button class="btn-add">+ Adicionar Carro</button>
            </div>
            
            <!-- TODO: Integrar com api para retornar veiculos cadastrados-->
            <div class="car-grid">
                <article class="car-card">
                    <img src="carro1.jpg" alt="Modelo Corsa">
                    <div class="card-info">
                        <h3>Corsa Wind</h3>
                        <p>$250,000</p>
                    </div>
                </article>
                </div>
        </section>

    </main>

<!-------------------------------------------------------------------------->

    <footer>
        
    </footer>    
    
    <script src="assets/js/script.js"></script>
</body>
</html>
